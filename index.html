<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 🧠 Base Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .chat-container { height: 60vh; overflow-y: auto; }
        .memory-item {
            background: #1e293b;
            border-left: 3px solid #6366f1;
            padding: 10px 12px;
            border-radius: 6px;
            margin: 6px 0;
            font-size: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .memory-item:hover {
            background: #334155;
            border-left-color: #a78bfa;
        }
        .memory-label {
            color: #a78bfa;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.5px;
        }
        .memory-value {
            color: #cbd5e1;
            margin-top: 2px;
            word-break: break-word;
            font-size: 11px;
        }
        .insight-item {
            background: #1f2937;
            border-left: 3px solid #8b5cf6;
            padding: 8px 10px;
            border-radius: 6px;
            margin: 6px 0;
            font-size: 11px;
        }
        .insight-key {
            color: #c084fc;
            font-weight: 600;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .insight-text {
            color: #d1d5db;
            margin-top: 3px;
            line-height: 1.3;
            font-size: 10px;
        }
        .insight-time {
            font-size: 0.75rem;
            color: #71717a;
            margin-top: 0.25rem;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(100, 100, 120, 0.3);
        }
        .section-header i {
            font-size: 12px;
        }
        .section-header span {
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white selection:bg-indigo-500/50">
    <div class="max-w-6xl mx-auto p-4 flex flex-col h-screen gap-4">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-x-2">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-amber-500 rounded-2xl flex items-center justify-center shadow-[0_0_15px_rgba(99,102,241,0.5)]">
                    <i class="fa-solid fa-code text-white text-lg animate-[pulse_2s_ease-in-out_infinite]"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-amber-200">Gemini</h1>
                    <p class="text-xs text-indigo-200 opacity-80">Base Architecture</p>
                </div>
            </div>
            <button onclick="startNewChat()" class="bg-zinc-700 hover:bg-zinc-600 px-3 py-1.5 rounded-lg text-xs font-bold transition">
                <i class="fa-solid fa-plus mr-1"></i> New Chat
            </button>
        </div>

        <div class="grid grid-cols-4 gap-3 flex-1 overflow-hidden">
            <div class="bg-gradient-to-br from-indigo-950/30 to-violet-950/15 border border-indigo-900/50 rounded-2xl p-3 overflow-y-auto">
                <div class="section-header">
                    <i class="fa-solid fa-star text-indigo-400"></i>
                    <span class="text-indigo-300">Core</span>
                </div>
                <div id="core-memories" class="space-y-1">
                    <div class="text-xs text-zinc-500 italic">Becoming known...</div>
                </div>
            </div>

            <div class="col-span-2 bg-zinc-900 rounded-2xl p-3 shadow-xl flex flex-col overflow-hidden border border-zinc-800">
                <div id="chat" class="chat-container space-y-3 flex-1 overflow-y-auto text-sm"></div>
                
                <div id="camera-container" class="hidden mt-2 relative bg-black rounded-lg overflow-hidden border border-indigo-500 mx-auto text-center shadow-lg">
                    <video id="video-feed" autoplay playsinline class="mx-auto h-[100px] w-auto"></video>
                </div>
                
                <div class="flex gap-2 mt-2 pt-2">
                    <button onclick="toggleCamera()" id="cam-btn" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-400 px-2 rounded-lg transition border border-zinc-700 text-xs">
                        <i class="fa-solid fa-camera"></i>
                    </button>
                    <input id="input" type="text" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-1.5 text-white placeholder-zinc-500 focus:outline-none focus:border-indigo-500 shadow-inner text-xs" placeholder="Talk..." autocomplete="off">
                    <button onclick="sendMessage()" class="bg-indigo-600 hover:bg-indigo-500 px-3 rounded-lg font-bold text-white transition text-xs">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>

            <div class="bg-gradient-to-br from-purple-950/30 to-violet-950/15 border border-purple-900/50 rounded-2xl p-3 overflow-y-auto">
                <div class="section-header">
                    <i class="fa-solid fa-lightbulb text-purple-400"></i>
                    <span class="text-purple-300">Insights</span>
                </div>
                <div id="insights" class="space-y-1">
                    <div class="text-xs text-zinc-500 italic">Learning...</div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="hidden-canvas" class="hidden"></canvas>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-xl p-5 border border-indigo-500 max-w-sm w-full mx-4">
            <h2 class="text-lg font-bold text-indigo-300 mb-3">Edit Memory</h2>
            <input id="edit-key" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-2 py-1 text-white mb-2 text-xs" disabled>
            <textarea id="edit-value" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-2 py-1 text-white mb-3 h-20 resize-none text-xs"></textarea>
            <div class="flex gap-2">
                <button onclick="saveMemoryEdit()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded-lg text-xs font-bold transition">Save</button>
                <button onclick="closeEditModal()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 px-3 py-1.5 rounded-lg text-xs font-bold transition">Cancel</button>
                <button onclick="deleteMemoryEntry()" class="bg-red-600 hover:bg-red-500 px-3 py-1.5 rounded-lg text-xs font-bold transition"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
    </div>

    <script>
        let messages = [];
        let coreMemories = [];
        let allMemories = {};
        let insights = [];
        let isCameraOn = false;
        let stream = null;
        let editingKey = null;

        async function loadMemory() {
            try {
                const res = await fetch('/api/memory');
                const data = await res.json();
                allMemories = data.memory || {};
                coreMemories = data.coreMemories || [];
                messages = data.history || [];
                insights = data.insights || [];
                renderChat();
                renderCoreMemories();
                renderInsights();
            } catch (err) {
                console.error("Init error:", err);
            }
        }

        // Wrapped the stand-alone post into a proper async function
        async function saveChatTurn() {
            try {
                await fetch('/api/memory', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'save-turn',
                        history: messages,
                        memory: allMemories,
                        coreMemories,
                        insights
                    })
                });
            } catch (err) {
                console.error("Failed to save turn:", err);
            }
        }

        function renderChat() { /* ... same as before ... */ }
        function renderCoreMemories() { /* ... same ... */ }
        function renderInsights() { /* ... same ... */ }
        async function startNewChat() { /* ... same ... */ }
        async function toggleCamera() { /* ... same ... */ }
        function snappicture() { /* ... same ... */ }
        function openEditModal(key) { /* ... same ... */ }
        function closeEditModal() { /* ... same ... */ }
        async function saveMemoryEdit() { /* ... same ... */ }
        async function deleteMemoryEntry() { /* ... same ... */ }

        async function sendMessage() {
            const input = document.getElementById('input');
            let text = input.value.trim();
            let pic = null;
            if (isCameraOn) {
                pic = snappicture();
                if (!text) text = "Look at this.";
                toggleCamera();
            }
            if (!text && !pic) return;

            messages.push({ role: 'user', content: text + (pic ? ' [Picture Sent]' : '') });
            renderChat();
            input.value = '';

            const loader = document.createElement('div');
            loader.className = 'bg-indigo-900/40 p-2 rounded-lg text-xs text-zinc-300';
            loader.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i>Thinking...';
            document.getElementById('chat').appendChild(loader);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        history: messages.slice(0, -1),
                        memory: allMemories,
                        vision_image: pic
                    })
                });
                const data = await res.json();
                loader.remove();

                if (data.reply) {
                    messages.push({ role: 'assistant', content: data.reply });
                    renderChat();
                    // Optional: call saveChatTurn() here if you want to sync dynamically
                    await saveChatTurn();
                }
                if (data.updatedMemory) allMemories = data.updatedMemory;
                if (data.coreMemories) {
                    coreMemories = data.coreMemories;
                    renderCoreMemories();
                }
                if (data.insights) {
                    insights = data.insights;
                    renderInsights();
                }
            } catch (err) {
                loader.remove();
                alert("Connection lost.");
            }
        }

        window.onload = loadMemory;

        document.getElementById('input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        document.getElementById('edit-modal').addEventListener('click', (e) => {
            if (e.target.id === 'edit-modal') closeEditModal();
        });
    </script>
</body>
</html>
